<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Register.css">
    <style>@import url('https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&display=swap');</style>
    <style>@import url('https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&family=Krona+One&display=swap');</style>
</head>

<body>
    <header>

        <section id="logo">
            <div id="logo_interno">
                <p>Nexo</p>
                <p style="color: #E9C46A">.</p>
            </div>
        </section>

        <div id="voltar">
            <button>
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-arrow-left-icon lucide-arrow-left">
                <path d="m12 19-7-7 7-7" />
                <path d="M19 12H5" />
                </svg>
            </button>
        </div>

    </header>

    <main>
        <section id="faixa_m">
            <div>

            </div>
        </section>

        <section id="faixa_b">
            <form id="formulario">
                <div id="campos_formulario">
                    <p>Registre-se</p>
                    <input class="campos" type="text" placeholder="Usuário">
                    <input class="campos" type="email" placeholder="E-mail">
                    <input class="campos" type="password" placeholder="Senha">
                    <input class="campos" type="password" placeholder="Confirme a senha">
                    <div id="termos_condicoes">
                        <input type="checkbox" name="termos">
                        <label id="text" for="termos">Concordo com os termos e condições.</label>
                    </div>
                    <button id="send">Finalizar</button>
                </div>
            </form>
        </section>

    </main>
</body>

</html>
